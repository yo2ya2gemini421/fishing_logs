<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>王禅寺LOG v5.5 Meritocracy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #0f172a; --text: #f8fafc; --accent: #3b82f6; --btn-bg: #1e293b; --undo: #7f1d1d; --lure: #065f46; --others: #475569; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; touch-action: manipulation; }
        .score-board { margin-bottom: 15px; border: 1px solid #334155; padding: 15px; border-radius: 16px; background: #1e293b; text-align: center; }
        .score-today { font-size: 32px; font-weight: 900; color: var(--accent); }
        .grid-gear { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 15px; }
        .gear-btn { height: 75px; border-radius: 12px; border: 2px solid #334155; font-weight: 900; background: var(--btn-bg); color: #fff; font-size: 28px; }
        .gear-btn.selected { background: var(--accent)!important; border-color: #fff; transform: scale(0.92); }
        
        /* 4連スロットのスタイル */
        .lure-slot-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .slot-btn { height: 65px; border-radius: 12px; border: none; color: white; font-weight: 800; font-size: 11px; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.1s; position: relative; }
        .slot-btn:active { transform: scale(0.95); }
        .slot-btn small { font-size: 9px; opacity: 0.7; margin-top: 2px; }
        .rank-1 { background: #b45309; border: 2px solid #fbbf24; } /* 1位は少しゴージャスに */
        .rank-2, .rank-3 { background: var(--lure); }
        .rank-others { background: var(--others); }

        #log-display { width: 100%; height: 160px; background: #000; color: #4ade80; font-family: monospace; font-size: 11px; padding: 12px; overflow-y: auto; border: 1px solid #334155; border-radius: 8px; margin-bottom: 15px; }
        .input-area { display: flex; gap: 8px; margin-bottom: 15px; padding: 8px; background: #1e293b; border-radius: 12px; }
        input { flex: 1; height: 45px; border-radius: 8px; background: #0f172a; color: #fff; padding: 0 12px; }
        .add-btn { width: 70px; background: var(--accent); color: #fff; font-weight: 800; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="score-board p-4">
        <div class="score-today">本日の釣果: <span id="today-count">0</span> 匹</div>
        <button onclick="editTotal()" class="text-[11px] text-slate-400 font-bold bg-slate-800 px-3 py-1 rounded-full">
            通算: <span id="total-count">391</span> 匹
        </button>
    </div>

    <div class="grid-gear" id="gear-area">
        <button onclick="selG(this,'V','１号機 Vanquish')" class="gear-btn">V</button>
        <button onclick="selG(this,'S','５号機 STELLA')" class="gear-btn">S</button>
        <button onclick="selG(this,'E','８号機 EXIST SF')" class="gear-btn">E</button>
        <button onclick="selG(this,'T','９号機 Twin Power')" class="gear-btn">T</button>
        <button onclick="selG(this,'A','１２号機 Airity ST SF')" class="gear-btn">A</button>
    </div>

    <div id="lure-label" class="text-center text-[10px] font-bold mb-2 text-blue-400 tracking-tighter">SELECT UNIT</div>

    <div class="lure-slot-grid" id="lure-area"></div>

    <div class="input-area" id="manual-input">
        <input type="text" id="lure-input" placeholder="New Lure..." onkeypress="if(event.key==='Enter')addL()">
        <button id="send-btn" class="add-btn" onclick="addL()">GET</button>
    </div>

    <div id="log-display"></div>

    <div class="grid grid-cols-4 gap-2">
        <button onclick="undo()" class="h-10 rounded-lg bg-red-900 font-bold text-xs">UNDO</button>
        <button onclick="resetToday()" class="h-10 rounded-lg bg-slate-700 font-bold text-xs">RESET</button>
        <button onclick="copyLog()" class="h-10 rounded-lg bg-blue-700 font-bold text-xs">COPY</button>
        <button onclick="addMemo()" class="h-10 rounded-lg bg-indigo-700 font-bold text-xs">MEMO</button>
    </div>

    <script>
        let total = parseInt(localStorage.getItem('oz-total')) || 391;
        let totalS = parseInt(localStorage.getItem('oz-totalS')) || total;
        let gearCode = "";
        let gearFull = "";
        let stats = JSON.parse(localStorage.getItem('oz-stats')) || {};

        function selG(e, code, full) {
            document.querySelectorAll('#gear-area button').forEach(b => b.classList.remove('selected'));
            e.classList.add('selected');
            gearCode = code;
            gearFull = full;
            document.getElementById('lure-label').innerText = "⚡️ " + full;
            renderLures();
        }

        function renderLures() {
            const e = document.getElementById('lure-area');
            e.innerHTML = '';
            if (!gearCode) return;
            if (!stats[gearCode]) stats[gearCode] = {};

            // 釣果順にソート
            const sorted = Object.keys(stats[gearCode]).sort((a, b) => stats[gearCode][b] - stats[gearCode][a]);
            
            // 上位3つを表示
            for (let i = 0; i < 3; i++) {
                const lure = sorted[i];
                const btn = document.createElement('button');
                btn.className = `slot-btn rank-${i+1}`;
                if (lure) {
                    btn.innerHTML = `${lure}<small>${stats[gearCode][lure]} 🐟</small>`;
                    btn.onclick = () => rec(lure);
                } else {
                    btn.innerHTML = `<span class="opacity-20">-</span>`;
                    btn.disabled = true;
                }
                e.appendChild(btn);
            }

            // 4つ目はOTHERSボタン
            const others = document.createElement('button');
            others.className = 'slot-btn rank-others';
            others.innerHTML = `OTHERS<small>History</small>`;
            others.onclick = () => document.getElementById('lure-input').focus();
            e.appendChild(others);
        }

        function rec(lureName) {
            if (!gearCode) return;
            total++;
            stats[gearCode][lureName] = (stats[gearCode][lureName] || 0) + 1;
            save();
            
            const t = document.getElementById('log-display');
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ":" + 
                            now.getMinutes().toString().padStart(2, '0') + ":" + 
                            now.getSeconds().toString().padStart(2, '0');
            
            t.innerText = `[${timeStr}] ${gearCode} / ${lureName} / HIT!\n` + t.innerText;
            
            const btn = document.getElementById('send-btn');
            btn.innerText = "OK!";
            setTimeout(() => { btn.innerText = "GET"; }, 500);

            updateUI();
            renderLures();
            if (window.navigator.vibrate) window.navigator.vibrate([20, 30]);
        }

        function addL() {
            const i = document.getElementById('lure-input');
            const l = i.value.trim();
            if (l && gearCode) {
                rec(l);
                i.value = "";
                i.blur();
            }
        }

        function updateUI() {
            document.getElementById('today-count').innerText = Math.max(0, total - totalS);
            document.getElementById('total-count').innerText = total;
        }

        function save() {
            localStorage.setItem('oz-stats', JSON.stringify(stats));
            localStorage.setItem('oz-total', total);
            localStorage.setItem('oz-totalS', totalS);
        }

        function undo() {
            const e = document.getElementById('log-display');
            let t = e.innerText.trim().split('\n');
            if (t.length > 0) {
                const n = t.shift();
                if (n.includes('HIT!')) {
                    total = Math.max(0, total - 1);
                    const p = n.split(' / ');
                    const g = p[0].split('] ')[1];
                    const l = p[1];
                    if (stats[g] && stats[g][l] > 0) stats[g][l]--;
                }
                e.innerText = t.join('\n') + (t.length > 0 ? '\n' : '');
                save();
                updateUI();
                renderLures();
            }
        }

        function resetToday() { if (confirm("本日分をリセット？")) { totalS = total; save(); updateUI(); } }
        function editTotal() { const v = prompt("修正後の通算:", total); if (v) { const n = parseInt(v); totalS += (n - total); total = n; save(); updateUI(); } }
        function copyLog() { navigator.clipboard.writeText(document.getElementById('log-display').innerText); alert("COPIED"); }
        function addMemo() { const m = prompt("MEMO:"); if(m) { const now = new Date(); document.getElementById('log-display').innerText = `[${now.toLocaleTimeString()} MEMO] ${m}\n` + document.getElementById('log-display').innerText; } }

        updateUI();
    </script>
</body>
</html>
