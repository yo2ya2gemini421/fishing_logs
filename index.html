<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>王禅寺LOG v2.0 Recovery-Stable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #0f172a; --text: #f8fafc; --accent: #3b82f6; --recent: #ef4444; --lure: #065f46; --others: #475569; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 15px; touch-action: manipulation; }
        .score-board { margin-bottom: 12px; border: 1px solid #334155; border-radius: 16px; background: #1e293b; text-align: center; }
        .grid-gear { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 12px; }
        .gear-btn { height: 75px; border-radius: 12px; border: 2px solid #334155; font-weight: 900; background: #1e293b; color: #fff; font-size: 28px; }
        .gear-btn.selected { background: var(--accent)!important; border-color: #fff; transform: scale(0.92); }
        .lure-slot-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 12px; }
        .slot-btn { height: 70px; border-radius: 10px; border: none; color: white; font-weight: 800; font-size: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .slot-btn small { font-size: 8px; opacity: 0.7; margin-top: 2px; }
        .rank-recent { background: var(--recent); border: 2px solid #fca5a5; }
        .rank-1 { background: #b45309; }
        .rank-2, .rank-3 { background: var(--lure); }
        .rank-others { background: var(--others); }
        #history-panel { display: none; background: #1e293b; border-radius: 12px; padding: 10px; margin-bottom: 12px; border: 1px solid var(--others); }
        #log-display { width: 100%; height: 140px; background: #000; color: #4ade80; font-family: monospace; font-size: 11px; padding: 10px; overflow-y: auto; border-radius: 8px; margin-bottom: 12px; }
        .input-area { display: flex; gap: 8px; margin-bottom: 12px; padding: 8px; background: #1e293b; border-radius: 12px; }
        input { flex: 1; height: 40px; border-radius: 8px; background: #0f172a; color: #fff; padding: 0 10px; border: 1px solid #334155; }
    </style>
</head>
<body>
    <div class="score-board p-3">
        <div class="text-3xl font-black text-blue-500" id="today-count">0</div>
        <button onclick="editTotal()" class="text-[10px] text-slate-400 font-bold">2026通算: <span id="total-count">-</span> 匹</button>
    </div>

    <div class="grid-gear" id="gear-area">
        <button onclick="selG(this,'V','1号機 Vanquish')" class="gear-btn">V</button>
        <button onclick="selG(this,'S','5号機 STELLA')" class="gear-btn">S</button>
        <button onclick="selG(this,'E','8号機 EXIST SF')" class="gear-btn">E</button>
        <button onclick="selG(this,'T','9号機 Twin Power')" class="gear-btn">T</button>
        <button onclick="selG(this,'A','12号機 Airity ST')" class="gear-btn">A</button>
    </div>

    <div id="lure-label" class="text-center text-[9px] font-bold mb-2 text-blue-400">SELECT UNIT</div>
    <div class="lure-slot-grid" id="lure-area"></div>

    <div id="history-panel">
        <div class="text-[10px] mb-2 text-slate-400 font-bold border-b border-slate-600 pb-1">LURE MASTER (ALL TIME)</div>
        <div class="grid grid-cols-3 gap-2" id="master-list"></div>
    </div>

    <div class="input-area">
        <input type="text" id="lure-input" placeholder="Lure Name..." onkeypress="if(event.key==='Enter')addL()">
        <button onclick="addL()" class="w-12 h-10 bg-blue-600 rounded-lg font-bold">GET</button>
    </div>

    <div id="log-display"></div>

    <div class="grid grid-cols-4 gap-2">
        <button onclick="undo()" class="h-10 rounded-lg bg-red-900 font-bold text-[10px]">UNDO</button>
        <button onclick="resetToday()" class="h-10 rounded-lg bg-slate-700 font-bold text-[10px]">RESET</button>
        <button onclick="copyLog()" class="h-10 rounded-lg bg-blue-700 font-bold text-[10px]">COPY</button>
        <button onclick="addMemo()" class="h-10 rounded-lg bg-indigo-700 font-bold text-[10px]">MEMO</button>
    </div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbx4gA69eRIEnPne0ovQEni9SioYncpiIwJjqkXLm3lzcnxrNFBrJLVajP5uNi4xHW4jkw/exec";

    let total = parseInt(localStorage.getItem('oz-total')) || 410;
    let totalS = parseInt(localStorage.getItem('oz-totalS')) || total;
    let gearCode = "";
    let recentStats = JSON.parse(localStorage.getItem('oz-recentStats')) || {};
    let stats = JSON.parse(localStorage.getItem('oz-stats')) || {};
    let todayStats = JSON.parse(localStorage.getItem('oz-todayStats')) || {};
    let isNewSessionFlag = false;

    // --- 【修正】まずローカルで表示し、後からGASと同期する ---
    async function loadMasterFromSheet() {
        updateUI(); // まず画面を出す
        try {
            const res = await fetch(GAS_URL);
            const data = await res.json();
            if (data) {
                if (data.stats) stats = data.stats;
                if (data.total) {
                    total = parseInt(data.total);
                    totalS = total - (data.dayCount || 0);
                }
                if (data.logs) document.getElementById('log-display').innerText = data.logs.join('\n') + '\n';
                saveLocally();
                updateUI();
                if(gearCode) renderLures();
            }
        } catch (e) { console.error("初期取得失敗:", e); }
    }

    window.onload = loadMasterFromSheet;

    // --- 通信処理（絶対に画面をロックさせない） ---
    function send(payload) {
        fetch(GAS_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "text/plain" },
            body: JSON.stringify(payload)
        }).catch(e => console.error("送信エラー:", e));
    }

    function rec(lure) {
        if (!gearCode) return;
        total++;
        recentStats[gearCode] = lure;
        if (!todayStats[gearCode]) todayStats[gearCode] = {};
        todayStats[gearCode][lure] = (todayStats[gearCode][lure] || 0) + 1;
        if (!stats[gearCode]) stats[gearCode] = {}; 
        stats[gearCode][lure] = (stats[gearCode][lure] || 0) + 1;

        const dayCount = Math.max(0, total - totalS);
        const now = new Date();
        
        const logLine = `[${getFullTime()}] ${gearCode} / ${lure} / 当:${dayCount}\n`;
        document.getElementById('log-display').innerText = logLine + document.getElementById('log-display').innerText;

        send({
            type: "HIT",
            date: `${now.getFullYear()}/${(now.getMonth()+1).toString().padStart(2,'0')}/${now.getDate().toString().padStart(2,'0')}`,
            time: now.toLocaleTimeString('ja-JP', { hour12: false }),
            gear: gearCode,
            lure: lure,
            isNewSession: isNewSessionFlag,
            stats: stats
        });

        isNewSessionFlag = false;
        saveLocally();
        updateUI();
        renderLures();
        if (window.navigator.vibrate) window.navigator.vibrate(20);
    }

    // --- 【修正】RESET時にGAS同期を強制的に走り直させる ---
    async function resetToday() {
        if(confirm("【警告】セッションを切り替えて最新データを再取得しますか？")) {
            todayStats = {};
            recentStats = {};
            totalS = total;
            isNewSessionFlag = true;
            saveLocally();
            document.getElementById('log-display').innerText = "Syncing with GAS...\n";
            updateUI();
            renderLures();
            
            // RESETと同時に最新マスタを取得し直す
            await loadMasterFromSheet();
        }
    }

    function saveLocally() {
        localStorage.setItem('oz-total', total);
        localStorage.setItem('oz-totalS', totalS);
        localStorage.setItem('oz-stats', JSON.stringify(stats));
        localStorage.setItem('oz-todayStats', JSON.stringify(todayStats));
        localStorage.setItem('oz-recentStats', JSON.stringify(recentStats));
    }

    function updateUI() {
        document.getElementById('today-count').innerText = Math.max(0, total - totalS);
        document.getElementById('total-count').innerText = total;
    }

    function selG(btn, code, full) {
        document.querySelectorAll('#gear-area button').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        gearCode = code;
        document.getElementById('lure-label').innerText = "⚡️ " + full;
        document.getElementById('history-panel').style.display = 'none';
        renderLures();
    }

    function renderLures() {
        const area = document.getElementById('lure-area');
        area.innerHTML = '';
        if (!gearCode) return;
        const dS = todayStats[gearCode] || {};
        const aS = stats[gearCode] || {};
        let dKeys = Object.keys(dS).sort((a,b) => dS[b] - dS[a]);
        let aKeys = Object.keys(aS).sort((a,b) => aS[b] - aS[a]);
        
        const r = recentStats[gearCode] || "";
        createBtn(area, r, 'RECENT', 'rank-recent', () => r && rec(r));
        for(let i=0; i<3; i++) {
            let l = dKeys[i] || aKeys[i] || "";
            let lbl = dS[l] ? dS[l]+" 🐟" : (l ? "PRESET" : "-");
            createBtn(area, l, lbl, `rank-${i+1}`, () => l && rec(l));
        }
        createBtn(area, 'OTHERS', 'MASTER', 'rank-others', toggleMaster);
    }

    function createBtn(parent, name, label, cls, fn) {
        const b = document.createElement('button');
        b.className = `slot-btn ${cls}`;
        b.innerHTML = name ? `<span class="truncate w-full px-1">${name}</span><small>${label}</small>` : '-';
        b.onclick = fn;
        parent.appendChild(b);
    }

    function toggleMaster() {
        const p = document.getElementById('history-panel');
        if (p.style.display === 'block') { p.style.display = 'none'; return; }
        p.style.display = 'block';
        const list = document.getElementById('master-list');
        list.innerHTML = '';
        let gs = {};
        Object.keys(stats).forEach(g => {
            Object.keys(stats[g]).forEach(l => { gs[l] = (gs[l] || 0) + stats[g][l]; });
        });
        Object.keys(gs).sort((a,b) => gs[b] - gs[a]).forEach(l => {
            const b = document.createElement('button');
            b.className = 'bg-slate-700 p-2 rounded text-[10px] truncate';
            b.innerText = l;
            b.onclick = () => { rec(l); p.style.display = 'none'; };
            list.appendChild(b);
        });
    }

    function addL() {
        const i = document.getElementById('lure-input');
        if (i.value.trim() && gearCode) { rec(i.value.trim()); i.value = ""; i.blur(); }
    }

    function undo() {
        const log = document.getElementById('log-display');
        let lines = log.innerText.trim().split('\n');
        if (lines.length > 0) {
            const top = lines.shift();
            if (top.includes(' / ')) {
                total = Math.max(0, total - 1);
                const parts = top.split('] ')[1].split(' / ');
                const g = parts[0], l = parts[1];
                if (todayStats[g] && todayStats[g][l] > 0) todayStats[g][l]--;
                if (stats[g] && stats[g][l] > 0) stats[g][l]--;
            }
            log.innerText = lines.join('\n') + (lines.length > 0 ? '\n' : '');
            saveLocally(); updateUI(); renderLures();
        }
    }

    function editTotal() {
        const v = prompt("通算修正:", total);
        if (v) { total = parseInt(v); saveLocally(); updateUI(); send({type:"UPDATE_MASTER", totalCount: total, stats: stats}); }
    }

    function copyLog() { navigator.clipboard.writeText(document.getElementById('log-display').innerText); alert("COPIED!"); }
    function addMemo() {
        const m = prompt("MEMO:");
        if(m) {
            const logStr = `[${getFullTime()} MEMO] ${m}\n`;
            document.getElementById('log-display').innerText = logStr + document.getElementById('log-display').innerText;
        }
    }
    function getFullTime() {
        const n = new Date();
        return `${n.getFullYear()}/${(n.getMonth()+1).toString().padStart(2,'0')}/${n.getDate().toString().padStart(2,'0')} ${n.getHours().toString().padStart(2,'0')}:${n.getMinutes().toString().padStart(2,'0')}:${n.getSeconds().toString().padStart(2,'0')}`;
    }
</script>
</body>
</html>
