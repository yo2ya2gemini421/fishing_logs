<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>王禅寺LOG v1.6 Master-Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #0f172a; --text: #f8fafc; --accent: #3b82f6; --recent: #ef4444; --lure: #065f46; --others: #475569; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 15px; touch-action: manipulation; }
        .score-board { margin-bottom: 12px; border: 1px solid #334155; border-radius: 16px; background: #1e293b; text-align: center; }
        .grid-gear { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 12px; }
        .gear-btn { height: 75px; border-radius: 12px; border: 2px solid #334155; font-weight: 900; background: #1e293b; color: #fff; font-size: 28px; }
        .gear-btn.selected { background: var(--accent)!important; border-color: #fff; transform: scale(0.92); }
        .lure-slot-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 12px; }
        .slot-btn { height: 70px; border-radius: 10px; border: none; color: white; font-weight: 800; font-size: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .slot-btn small { font-size: 8px; opacity: 0.7; margin-top: 2px; }
        .rank-recent { background: var(--recent); border: 2px solid #fca5a5; }
        .rank-1 { background: #b45309; }
        .rank-2, .rank-3 { background: var(--lure); }
        .rank-others { background: var(--others); }
        #history-panel { display: none; background: #1e293b; border-radius: 12px; padding: 10px; margin-bottom: 12px; border: 1px solid var(--others); }
        #log-display { width: 100%; height: 140px; background: #000; color: #4ade80; font-family: monospace; font-size: 11px; padding: 10px; overflow-y: auto; border-radius: 8px; margin-bottom: 12px; }
        .input-area { display: flex; gap: 8px; margin-bottom: 12px; padding: 8px; background: #1e293b; border-radius: 12px; }
        input { flex: 1; height: 40px; border-radius: 8px; background: #0f172a; color: #fff; padding: 0 10px; border: 1px solid #334155; }
    </style>
</head>
<body>
    <div class="score-board p-3">
        <div class="text-3xl font-black text-blue-500" id="today-count">0</div>
        <button onclick="editTotal()" class="text-[10px] text-slate-400 font-bold">2026通算: <span id="total-count">391</span> 匹</button>
    </div>

    <div class="grid-gear" id="gear-area">
        <button onclick="selG(this,'V','1号機 Vanquish')" class="gear-btn">V</button>
        <button onclick="selG(this,'S','5号機 STELLA')" class="gear-btn">S</button>
        <button onclick="selG(this,'E','8号機 EXIST SF')" class="gear-btn">E</button>
        <button onclick="selG(this,'T','9号機 Twin Power')" class="gear-btn">T</button>
        <button onclick="selG(this,'A','12号機 Airity ST')" class="gear-btn">A</button>
    </div>

    <div id="lure-label" class="text-center text-[9px] font-bold mb-2 text-blue-400">SELECT UNIT</div>
    <div class="lure-slot-grid" id="lure-area"></div>

    <div id="history-panel">
        <div class="text-[10px] mb-2 text-slate-400 font-bold border-b border-slate-600 pb-1">LURE MASTER (ALL TIME)</div>
        <div class="grid grid-cols-3 gap-2" id="master-list"></div>
    </div>

    <div class="input-area">
        <input type="text" id="lure-input" placeholder="Lure Name..." onkeypress="if(event.key==='Enter')addL()">
        <button onclick="addL()" class="w-12 h-10 bg-blue-600 rounded-lg font-bold">GET</button>
    </div>

    <div id="log-display"></div>

    <div class="grid grid-cols-4 gap-2">
        <button onclick="undo()" class="h-10 rounded-lg bg-red-900 font-bold text-[10px]">UNDO</button>
        <button onclick="resetToday()" class="h-10 rounded-lg bg-slate-700 font-bold text-[10px]">RESET</button>
        <button onclick="copyLog()" class="h-10 rounded-lg bg-blue-700 font-bold text-[10px]">COPY</button>
        <button onclick="addMemo()" class="h-10 rounded-lg bg-indigo-700 font-bold text-[10px]">MEMO</button>
    </div>

<script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbx4gA69eRIEnPne0ovQEni9SioYncpiIwJjqkXLm3lzcnxrNFBrJLVajP5uNi4xHW4jkw/exec";

        let total = parseInt(localStorage.getItem('oz-total')) || 391;
        let totalS = parseInt(localStorage.getItem('oz-totalS')) || total;
        let gearCode = "";
        let recentStats = JSON.parse(localStorage.getItem('oz-recentStats')) || {};
        let stats = JSON.parse(localStorage.getItem('oz-stats')) || {};
        let todayStats = JSON.parse(localStorage.getItem('oz-todayStats')) || {};

        // --- ★追加：スプレッドシートからマスタを読み込む ---
        async function loadMasterFromSheet() {
            try {
                const response = await fetch(GAS_URL);
                const remoteStats = await response.json();
                if (remoteStats && Object.keys(remoteStats).length > 0) {
                    stats = remoteStats;
                    localStorage.setItem('oz-stats', JSON.stringify(stats));
                    if(gearCode) renderLures(); 
                    console.log("Master Synced from Sheet");
                }
            } catch (e) { console.error("Load failed", e); }
        }

        // ページ読み込み時に実行
        window.onload = () => {
            updateUI();
            loadMasterFromSheet();
        };

        function getFullTime() {
            const now = new Date();
            const y = now.getFullYear();
            const m = (now.getMonth() + 1).toString().padStart(2, '0');
            const d = now.getDate().toString().padStart(2, '0');
            const h = now.getHours().toString().padStart(2, '0');
            const i = now.getMinutes().toString().padStart(2, '0');
            const s = now.getSeconds().toString().padStart(2, '0');
            return `${y}/${m}/${d} ${h}:${i}:${s}`;
        }

        function selG(e, code, full) {
            document.querySelectorAll('#gear-area button').forEach(b => b.classList.remove('selected'));
            e.classList.add('selected');
            gearCode = code;
            document.getElementById('lure-label').innerText = "⚡️ " + full;
            document.getElementById('history-panel').style.display = 'none';
            renderLures();
        }

        function renderLures() {
            const e = document.getElementById('lure-area');
            e.innerHTML = '';
            if (!gearCode) return;
            if (!todayStats[gearCode]) todayStats[gearCode] = {};
            if (!stats[gearCode]) stats[gearCode] = {};
            let dailySorted = Object.keys(todayStats[gearCode]).sort((a, b) => todayStats[gearCode][b] - todayStats[gearCode][a]);
            let totalSorted = Object.keys(stats[gearCode]).sort((a, b) => stats[gearCode][b] - stats[gearCode][a]);
            const rLure = recentStats[gearCode] || "";
            createSlot(e, rLure, 'RECENT', 'rank-recent', () => rLure && rec(rLure));
            for (let i = 0; i < 3; i++) {
                let lure = dailySorted[i] || totalSorted[i] || "";
                let isPreset = !dailySorted[i] && totalSorted[i];
                let count = todayStats[gearCode][lure] || 0;
                let label = isPreset ? "PRESET" : (count + " 🐟");
                createSlot(e, lure, label, `rank-${i+1}`, () => lure && rec(lure));
            }
